<div class="container mt-4">

  <!-- Navigation -->
  <div class="mb-3 d-flex justify-content-between align-items-center">
    <a class="btn btn-light" routerLink="/">Home</a>
    <a [routerLink]="['/students/new']" data-cy="studentslist-link-create">Create a new Student</a>
  </div>
  
  <!-- Message -->
  <div>
        @if (message) {
        <div class="alert" [ngClass]="{
          'alert-danger': messageType === 'error',
          'alert-success': messageType === 'success'
        }" data-cy="studentlist-div-alert">
          {{ message }}
        </div>
      }
  </div>

  <!-- Header -->
  <div class="d-flex fw-bold border-bottom pb-2 mb-2">
    <span style="width: 30%;">First Name</span>
    <span style="width: 30%;">Last Name</span>
    <span style="width: 30%;">Email</span>
    <span style="width: 30%;">Birthdate</span>
    <span style="width: 40%;">Actions</span>
  </div>

  <!-- students -->
  <ul class="p-0 m-0" data-cy="studentlist-ul-students">
    <li class="d-flex align-items-center mb-2" *ngFor="let student of students">
      
      <span style="width: 30%;">{{ student.firstName }}</span>
      <span style="width: 30%;">{{ student.lastName }}</span>
      <span style="width: 30%;">{{ student.email }}</span>
      <span style="width: 30%;">{{ student.birthDate }}</span>
      
      <span style="width: 40%; display: flex; gap: 12px;">
        <a [routerLink]="['/students', student.id, 'details']" data-cy="studentlist-a-details">Details</a>
        <a [routerLink]="['/students', student.id, 'edit']" data-cy="studentlist-a-edit">Edit</a>
        <a href="#" (click)="confirmDelete(student.id, $event)" data-cy="studentlist-a-delete">Delete</a>
      </span>

    </li>
  </ul>

</div>
